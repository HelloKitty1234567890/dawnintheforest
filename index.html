<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dawn in the Forest</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="name-screen">
    <h1>Dawn in the Forest</h1>
    <p>An unofficial Warriors game</p>
    <div id="name-box">
      <label for="prefix">What is your kit's name prefix?</label>
      <div id="name-preview"></div>
      <input type="text" id="prefix" maxlength="12" placeholder="e.g. Ripple" autocomplete="off" />
      <button id="start-btn">Join RiverClan!</button>
    </div>
  </div>

  <div id="game-screen" style="display:none">
    <canvas id="canvas"></canvas>
  </div>

  <script src="game.js"></script>
</body>
</html>
